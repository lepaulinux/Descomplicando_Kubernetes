apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-deployment
  labels:
    app: nginx-deployment

spec:
  replicas: 3

  selector:
    matchLabels:
      app: nginx-deployment

  strategy: {}

  template:
    metadata:
      labels:
        app: nginx-deployment

    spec:
      containers:
        - name: nginx
          image: nginx:1.19.2

          resources:
            limits:
              cpu: "0.5"
              memory: 256Mi
            requests:
              cpu: "0.25"
              memory: 128Mi

          livenessProbe: # Verifica se o container está vivo
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10 # Espera inicial antes do primeiro check
            periodSeconds: 10 # Intervalo entre checks
            timeoutSeconds: 5 # Tempo limite de cada check
            failureThreshold: 3 # Quantas falhas até reiniciar
